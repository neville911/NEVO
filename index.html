<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>NEVO | Aesthetic Protocol</title>
    <style>
        :root { --bg: #000; --accent: #D4AF37; --surface: #121212; --text: #FFF; --muted: #888; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 90px; }
        .view { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .header { border-left: 4px solid var(--accent); padding-left: 15px; margin-bottom: 25px; }
        .logo { font-size: 32px; font-weight: 900; letter-spacing: -1px; text-transform: uppercase; }
        .card { background: var(--surface); padding: 18px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #222; }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #000; padding: 20px 0; border-top: 1px solid #333; }
        .nav-btn { color: var(--muted); cursor: pointer; font-size: 12px; font-weight: 600; }
        .nav-btn.active { color: var(--accent); }
        .btn-action { background: var(--accent); color: #000; width: 100%; padding: 15px; border-radius: 8px; font-weight: 800; border: none; margin-top: 20px; }
    </style>
</head>
<body>

<div id="view-home" class="view active">
    <div class="header"><div class="logo">NEVO</div><p>Protocol Status: <span id="sess-count">0</span> Sessions</p></div>
    <div class="card"><h3>Today's Mission</h3><p>Execute the protocol with intensity. Precision is non-negotiable.</p></div>
    <button class="btn-action" onclick="show('protocols')">Select Protocol</button>
</div>

<div id="view-protocols" class="view">
    <h1>Workouts</h1>
    <div class="card" onclick="loadWorkout('Gym Push A')">Gym: Push A</div>
    <div class="card" onclick="loadWorkout('Home Push')">Home: Push</div>
    <div class="card" onclick="loadWorkout('Gym Pull A')">Gym: Pull A</div>
</div>

<div id="view-timer" class="view">
    <h1>Rest Timer</h1>
    <div id="timer-display" style="font-size: 60px; font-weight: 800; text-align: center; margin: 40px 0;">01:30</div>
    <button class="btn-action" onclick="runTimer()">Start 90s</button>
</div>

<div class="nav">
    <div class="nav-btn active" onclick="show('home')">HOME</div>
    <div class="nav-btn" onclick="show('protocols')">TRAIN</div>
    <div class="nav-btn" onclick="show('timer')">TIMER</div>
</div>

<script>
    function show(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
    }

    function loadWorkout(name) { alert('Loading: ' + name + '\nExecute strictly to protocol.'); }

    function runTimer() {
        let t = 90;
        let d = document.getElementById('timer-display');
        let i = setInterval(() => {
            t--;
            d.innerText = `00:${t < 10 ? '0'+t : t}`;
            if(t <= 0) { clearInterval(i); alert('Timer ended. Back to work.'); }
        }, 1000);
    }
</script>
</body>
</html>
