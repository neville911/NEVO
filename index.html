<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Aesthetic Protocol</title>
    <style>
        :root {
            --bg-base: #0A0A0A;
            --bg-surface: #1A1A1A;
            --bg-surface-light: #2A2A2A;
            --text-primary: #FFFFFF;
            --text-secondary: #8E8E93;
            --accent: #D4AF37; /* Rugged Gold/Neutral Accent */
            --accent-glow: rgba(212, 175, 55, 0.2);
            --danger: #FF453A;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            background-color: var(--bg-base); 
            color: var(--text-primary); 
            padding: 24px; 
            padding-top: 60px; 
            padding-bottom: 100px; /* Space for bottom nav */
        }

        /* Typography & Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header-text h2 { font-size: 14px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .header-text h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
        .avatar { width: 48px; height: 48px; border-radius: 24px; background: var(--bg-surface-light); border: 2px solid var(--bg-surface); box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        /* Progress Card with 3D feel */
        .progress-card { 
            background: linear-gradient(145deg, var(--bg-surface), #121212); 
            border-radius: 24px; 
            padding: 24px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.05);
        }
        .progress-info h3 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
        .progress-info p { color: var(--text-secondary); font-size: 13px; font-weight: 500; }
        
        /* Interactive Circular Progress */
        .ring-container { position: relative; width: 64px; height: 64px; }
        .ring { 
            width: 100%; height: 100%; 
            border-radius: 50%; 
            background: conic-gradient(var(--accent) 0%, var(--accent) 100%, var(--bg-surface-light) 0%);
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 15px var(--accent-glow);
        }
        .ring-inner {
            width: 54px; height: 54px;
            background-color: var(--bg-surface);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 14px; font-weight: 800;
        }

        /* Segmented Control (Toggle) */
        .toggle-wrapper { background: var(--bg-surface); border-radius: 16px; padding: 6px; display: flex; margin-bottom: 30px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
        .toggle-btn { 
            flex: 1; padding: 14px; text-align: center; border-radius: 12px; font-size: 14px; font-weight: 700; 
            color: var(--text-secondary); cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
        }
        .toggle-btn.active { background: var(--bg-surface-light); color: var(--text-primary); box-shadow: 0 4px 10px rgba(0,0,0,0.3); transform: scale(1.02); }

        /* List Layout */
        .section-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; }
        .section-title { font-size: 20px; font-weight: 800; }
        
        .activity-card { 
            background: var(--bg-surface); 
            border-radius: 20px; 
            padding: 16px; 
            display: flex; 
            align-items: center; 
            margin-bottom: 16px; 
            transition: transform 0.1s ease;
        }
        .activity-card:active { transform: scale(0.96); } /* Interactive press effect */
        
        .activity-icon { 
            width: 52px; height: 52px; 
            border-radius: 14px; 
            background: linear-gradient(135deg, var(--bg-surface-light), #222); 
            margin-right: 16px; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 18px; font-weight: 800; color: var(--accent);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.05);
        }
        .activity-info { flex: 1; }
        .activity-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.3px; }
        .activity-cue { font-size: 13px; color: var(--text-secondary); line-height: 1.4; display: flex; align-items: center; gap: 8px; }
        .load-badge { background: var(--bg-surface-light); padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; color: #FFF; }

        /* Action Button */
        .log-btn { 
            background: var(--text-primary); 
            color: var(--bg-base); 
            border: none; 
            width: 100%; 
            padding: 18px; 
            border-radius: 16px; 
            font-size: 16px; 
            font-weight: 800; 
            margin-top: 10px; 
            cursor: pointer; 
            transition: transform 0.1s ease;
            box-shadow: 0 8px 20px rgba(255,255,255,0.1);
        }
        .log-btn:active { transform: scale(0.96); }

        /* iOS Style Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(26, 26, 26, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.05);
            padding: 15px 30px 25px 30px;
            display: flex; justify-content: space-around; align-items: center;
        }
        .nav-item { width: 24px; height: 24px; border-radius: 50%; background: var(--text-secondary); opacity: 0.5; }
        .nav-item.active { background: var(--accent); opacity: 1; box-shadow: 0 0 10px var(--accent-glow); }

    </style>
</head>
<body>

    <div class="header">
        <div class="header-text">
            <h2>Aesthetic Protocol</h2>
            <h1>Ready to work.</h1>
        </div>
        <div class="avatar"></div>
    </div>

    <div class="progress-card">
        <div class="progress-info">
            <h3>Protocol Status</h3>
            <p id="workout-count">0 Sessions Logged</p>
        </div>
        <div class="ring-container">
            <div class="ring" id="progress-ring">
                <div class="ring-inner">GO</div>
            </div>
        </div>
    </div>

    <div class="toggle-wrapper">
        <div class="toggle-btn" id="btn-gym" onclick="switchPlan('gym')">Free Weights</div>
        <div class="toggle-btn active" id="btn-home" onclick="switchPlan('home')">Floor Only</div>
    </div>

    <div class="section-header">
        <div class="section-title" id="routine-title">Today's Routine</div>
    </div>

    <div id="exercise-list">
        </div>

    <button class="log-btn" onclick="logWorkout()">Log Session & Commit</button>

    <div class="bottom-nav">
        <div class="nav-item active"></div>
        <div class="nav-item"></div>
        <div class="nav-item"></div>
    </div>

    <script>
        const db = {
            gym: [
                { name: 'Barbell Bench Press', load: '5x5', cue: 'Explosive drive, 2s descent' },
                { name: 'DB Shoulder Press', load: '3x8', cue: 'Lower slowly to temples' },
                { name: 'Barbell Rows', load: '3x10-12', cue: 'Pull to lower stomach, 1s squeeze' }
            ],
            home: [
                { name: 'Standard Push-Ups', load: 'Bodyweight', cue: 'Go to technical failure' },
                { name: 'Pike Push-Ups', load: 'Bodyweight', cue: 'Hips jackknifed high. Lower skull to floor.' },
                { name: 'Reverse Floor Angels', load: 'Bodyweight', cue: 'Prone position. Scapular compression.' },
                { name: 'Single-Leg Glute Bridges', load: 'Bodyweight', cue: 'Complete isometric glute lock at peak.' },
                { name: 'Hollow Body Holds', load: 'Bodyweight', cue: 'Press lower lumbar flat into floor.' }
            ]
        };

        let currentPlan = 'home';
        let totalWorkouts = localStorage.getItem('creedWorkouts') ? parseInt(localStorage.getItem('creedWorkouts')) : 0;

        document.getElementById('workout-count').innerText = `${totalWorkouts} Sessions Logged`;
        renderExercises();

        function switchPlan(plan) {
            currentPlan = plan;
            document.getElementById('btn-gym').classList.remove('active');
            document.getElementById('btn-home').classList.remove('active');
            document.getElementById(`btn-${plan}`).classList.add('active');
            renderExercises();
        }

        function renderExercises() {
            const list = document.getElementById('exercise-list');
            list.innerHTML = ''; 

            db[currentPlan].forEach((ex, index) => {
                const card = document.createElement('div');
                card.className = 'activity-card';
                card.innerHTML = `
                    <div class="activity-icon">${index + 1}</div>
                    <div class="activity-info">
                        <div class="activity-name">${ex.name}</div>
                        <div class="activity-cue">
                            <span class="load-badge">${ex.load}</span>
                            <span>${ex.cue}</span>
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function logWorkout() {
            totalWorkouts++;
            localStorage.setItem('creedWorkouts', totalWorkouts);
            document.getElementById('workout-count').innerText = `${totalWorkouts} Sessions Logged`;
            
            // Visual feedback on the ring
            const ring = document.getElementById('progress-ring');
            ring.style.background = `conic-gradient(#D4AF37 100%, #2A2A2A 0%)`;
            
            // Haptic-like feedback for UI
            setTimeout(() => alert('Session logged successfully.'), 100);
        }
    </script>
</body>
</html>
